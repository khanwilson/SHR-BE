version: '3.9'

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: builder
    command: npm run start:dev
    environment:
      NODE_ENV: development
    volumes:
      - ./api/src:/app/src
      - app_storage:/app/storage

  vision-service:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./vision-service/app:/app/app
