version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: shr_db
      POSTGRES_USER: shr_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shr_user -d shr_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://shr_user:${POSTGRES_PASSWORD}@postgres:5432/shr_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      VISION_SERVICE_URL: http://vision-service:8001
      STORAGE_PATH: /app/storage
      STORAGE_BASE_URL: ${STORAGE_BASE_URL:-http://localhost:3000/storage}
      OCR_PROVIDER: ${OCR_PROVIDER:-google_vision}
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials/google-vision.json
      API_KEY: ${API_KEY}
      NODE_ENV: production
      PORT: 3000
    volumes:
      - app_storage:/app/storage
      - ./credentials:/app/credentials:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      vision-service:
        condition: service_healthy
    ports:
      - "3000:3000"

  vision-service:
    build:
      context: ./vision-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials/google-vision.json
    volumes:
      - ./credentials:/app/credentials:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    ports:
      - "8001:8001"

volumes:
  postgres_data:
  redis_data:
  app_storage:
